<!-- Create a Web Page for List tags- Unordered, Ordered and Description Lists -->

<!DOCTYPE html>
 <html>
    
    <head>
      <title>lists</title>  
    </head>

    <body>
        <h2>ordered list </h2>


        <ol type="A" reversed> coding language 
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
            
        </ol>

        <h2>unordered List</h2>

        <ul type="square"> coding language 
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

           <h2>Description List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>

    <dt>JS</dt>
    <dd> JavaScript </dd>
</dl>

    </body>

    </html>
